name: Reproduce analysis
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Tag or ref to reproduce
        default: v1.1.0

jobs:
  reproduce:
    runs-on: ubuntu-latest
    container: rocker/r2u:jammy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'v1.1.0' }}

      - name: Run SEM analysis from scratch
        run: Rscript sem_analysis_script.r > reproduced_output.txt 2>&1

      - name: Show tail of output
        run: tail -20 reproduced_output.txt

      - name: Assert key published numbers
        run: |
          set -e
          check() { grep -q "$1" reproduced_output.txt && echo "OK: $2" || { echo "FAIL: $2"; exit 1; }; }
          check "0.745"                        "standardized beta = 0.745 (primary 7-item model)"
          check "R2 (OLS2 excluded): 0.556"    "R-squared = 0.556 (primary 7-item model)"
          check "Alpha: 0.868"                 "Cronbach alpha = 0.868 (8-item scale)"
          check "1.000        1.013        0.000        0.041" "fit indices CFI=1.000 TLI=1.013 RMSEA=0.000 SRMR=0.041 (primary model)"
          check "Rows remaining: 112"          "N = 112 after consent filtering"
          echo "All key published numbers reproduced in a clean environment."

      - uses: actions/upload-artifact@v4
        with:
          name: reproduced_output
          path: reproduced_output.txt
